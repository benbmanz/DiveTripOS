<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Trip OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080e12;--sf:#0d1820;--sf2:#112030;--bd:#1a3040;
  --tl:#1a8a7a;--tb:#20b09c;--td:#0f4a42;
  --tx:#c8dde8;--txd:#6a8a9a;--txb:#e8f4fa;
  --am:#d4920a;--amd:#6a4805;--rd:#c0392b;--rdd:#5a1a14;--gn:#27ae60;
  --mo:'IBM Plex Mono',monospace;--sa:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--mo);}
.app{max-width:1100px;margin:0 auto;padding:20px 14px;padding-bottom:40px;}
/* HEADER */
.hdr{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.htitle{font-size:10px;letter-spacing:.2em;color:var(--tb);text-transform:uppercase;margin-bottom:3px;}
.hsub{font-size:20px;font-weight:600;color:var(--txb);letter-spacing:.05em;}
.hmeta{font-size:10px;color:var(--txd);text-align:right;line-height:1.8;}
/* NAV */
.nav{display:flex;gap:2px;margin-bottom:18px;border:1px solid var(--bd);padding:3px;background:var(--sf);flex-wrap:wrap;}
.nb{flex:1;min-width:55px;background:none;border:none;color:var(--txd);font-family:var(--mo);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:8px 3px;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;}
.nb:hover{color:var(--tx);background:var(--sf2);}
.nb.on{background:var(--td);color:var(--tb);border:1px solid var(--tl);}
/* PANELS */
.panel{display:none;}.panel.on{display:block;}
.ptitle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--tb);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
/* STATS */
.srow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.sbox{flex:1;min-width:100px;background:var(--sf);border:1px solid var(--bd);padding:10px 12px;}
.slbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--txd);margin-bottom:5px;}
.sval{font-size:18px;font-weight:600;color:var(--tb);}
.sunit{font-size:10px;color:var(--txd);margin-left:3px;}
/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txd);padding:6px 8px;border-bottom:1px solid var(--bd);font-weight:400;}
td{padding:8px;border-bottom:1px solid #0d1e2a;color:var(--tx);vertical-align:top;}
tr:hover td{background:var(--sf2);}
tr:last-child td{border-bottom:none;}
/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);padding:12px 14px;margin-bottom:8px;}
.ctitle{font-size:13px;font-weight:500;color:var(--txb);}
.csub{font-size:10px;color:var(--txd);margin-top:3px;}
.badge{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border:1px solid;display:inline-block;}
.bt{color:var(--tb);border-color:var(--tl);background:var(--td);}
.ba{color:var(--am);border-color:var(--amd);background:#1a0f02;}
.br{color:#e74c3c;border-color:var(--rdd);background:#1a0502;}
/* PROGRESS */
.pb{height:3px;background:var(--sf2);width:100%;margin-top:4px;}
.pf{height:100%;background:var(--tl);transition:width .3s;}
.pf.ov{background:var(--rd);}
.pf.wn{background:var(--am);}
/* FORMS */
.fr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.fl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txd);}
.fi{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mo);font-size:12px;padding:7px 10px;outline:none;width:100%;border-radius:0;-webkit-appearance:none;}
.fi:focus{border-color:var(--tl);}
.fta{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mo);font-size:11px;padding:8px 10px;outline:none;width:100%;resize:vertical;min-height:56px;border-radius:0;}
.fta:focus{border-color:var(--tl);}
/* BUTTONS */
.btn{font-family:var(--mo);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:7px 13px;border:1px solid;cursor:pointer;transition:all .15s;background:none;border-radius:0;-webkit-appearance:none;}
.bp{color:var(--tb);border-color:var(--tl);}
.bp:hover,.bp:active{background:var(--td);}
.bg2{color:var(--txd);border-color:var(--bd);}
.bg2:hover,.bg2:active{color:var(--tx);border-color:var(--txd);}
.bdn{color:#e74c3c;border-color:var(--rdd);}
.bdn:hover,.bdn:active{background:var(--rdd);}
.bsm{padding:4px 9px;font-size:9px;}
/* TAGS */
.tag{display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;background:var(--sf2);border:1px solid var(--bd);color:var(--txd);}
.nt{font-size:11px;color:var(--txd);font-family:var(--sa);line-height:1.5;margin-top:4px;}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;-webkit-overflow-scrolling:touch;}
.md{background:var(--sf);border:1px solid var(--tl);padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mdtitle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--tb);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.mda{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap;}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--td);border:1px solid var(--tl);color:var(--tb);font-size:11px;padding:10px 18px;z-index:200;white-space:nowrap;animation:tfi .2s ease;}
@keyframes tfi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* DIVE COUNTER */
.dc{display:flex;align-items:center;gap:5px;}
.db{width:24px;height:24px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mo);transition:all .1s;flex-shrink:0;}
.db:hover,.db:active{border-color:var(--tl);color:var(--tb);}
.dv{font-size:13px;font-weight:600;color:var(--tb);min-width:28px;text-align:center;}
/* FILTER */
.fc{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.fch{font-family:var(--mo);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--bd);background:none;color:var(--txd);cursor:pointer;border-radius:0;}
.fch.on{border-color:var(--tl);color:var(--tb);background:var(--td);}
/* REASONING */
.rp{background:#0e0a1a;border:1px solid #3a2060;overflow:hidden;margin-bottom:18px;}
.rh{background:#160d2a;border-bottom:1px solid #3a2060;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.rl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#9b77d4;}
.rm{font-size:9px;color:#5a3a8a;margin-left:auto;}
.riw{display:flex;}
.ri{flex:1;background:#0e0a1a;border:none;border-top:1px solid #3a2060;color:#d4b8f0;font-family:var(--mo);font-size:12px;padding:12px 14px;outline:none;resize:none;min-height:80px;-webkit-appearance:none;}
.ri::placeholder{color:#3a2060;}
.rs{background:#1a0f2e;border:none;border-top:1px solid #3a2060;border-left:1px solid #3a2060;color:#9b77d4;font-family:var(--mo);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:0 16px;cursor:pointer;transition:background .15s;white-space:nowrap;min-width:60px;}
.rs:hover,.rs:active{background:#2a1848;}
.rs:disabled{color:#3a2060;cursor:not-allowed;}
.ro{padding:14px;border-top:1px solid #3a2060;font-family:var(--sa);font-size:13px;color:#c8a8e8;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
.rt{padding:10px 14px;border-top:1px solid #3a2060;font-size:10px;color:#5a3a8a;letter-spacing:.1em;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.rhi{padding:10px 14px;border-bottom:1px solid #1a0f2e;cursor:pointer;}
.rhi:hover{background:#160d2a;}
.rhiq{font-size:11px;color:#9b77d4;margin-bottom:2px;}
.rhim{font-size:9px;color:#3a2060;}
/* MIC */
.mic{background:#1a0f2e;border:none;border-top:1px solid #3a2060;border-left:1px solid #3a2060;color:#9b77d4;font-size:20px;width:54px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mic:hover,.mic:active{background:#2a1848;}
.mic.on{background:#3a0a0a;border-color:#8a2020;color:#ff6060;animation:micpulse 1s ease-in-out infinite;}
.mic:disabled{color:#2a1848;cursor:not-allowed;}
@keyframes micpulse{0%,100%{opacity:.6}50%{opacity:1}}
/* KEY BAR */
.keybar{background:#0e0a1a;border:1px solid #3a2060;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.keybar-lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#5a3a8a;}
/* EMPTY */
.empty{text-align:center;padding:36px;color:var(--txd);font-size:11px;letter-spacing:.1em;}
/* CERT STATUS */
.cs-achieved{color:var(--gn);}
.cs-progress{color:var(--am);}
.cs-target{color:var(--tb);}
.cs-possible{color:var(--txd);}
/* SUNSET */
.sunset-item{opacity:.4;}
.sunset-item .ctitle{text-decoration:line-through;}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <div class="htitle">Trip Operating System · v1.0</div>

    </div>

  <nav class="nav">
    <button class="nb on" onclick="showTab('decisions')">Decisions</button>
    <button class="nb" onclick="showTab('gear')">Gear</button>

  <div id="tab-reasoning" class="panel"></div>
</div>

<div id="modalEl" class="mo" style="display:none" onclick="if(event.target===this)closeModal()"><div class="md" id="modalContent"></div></div>

// Load state
let STATE = (() => {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
})();

function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(STATE));
    const el = document.getElementById('syncStatus');
    if (el) { el.textContent = '● SAVED'; el.style.color = 'var(--tb)'; }
  } catch(e) {
    console.error('Save failed', e);
  }
}

function updateOpenVarCount() {
  const count = STATE.decisions.filter(d => !d.sunset && d.type === 'Open Variable').length;
  const meta = document.getElementById('hdrMeta');
  let flagEl = document.getElementById('openVarFlag');
  if (count > 0) {
    if (!flagEl) {
      flagEl = document.createElement('div');
      flagEl.id = 'openVarFlag';
      flagEl.style.color = 'var(--am)';
      meta.insertBefore(flagEl, document.getElementById('syncStatus'));
    }
    flagEl.textContent = `⚑ ${count} open variable${count>1?'s':''}`;
  } else if (flagEl) {
    flagEl.remove();
  }
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 2200);
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalEl').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modalEl').style.display = 'none';
}

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));

  document.getElementById('tab-' + name).classList.add('on');

function renderBudget() {
  const el = document.getElementById('tab-budget');
  const totAlloc = STATE.budget.categories.reduce((s,c) => s+(+c.allocated||0), 0);

  const segTot = STATE.segments.reduce((s,seg) => s+(+seg.budgetUSD||0), 0);
  const headroom = STATE.budget.totalRunway - totAlloc;
  const pct = (sp, al) => !al ? 0 : Math.min(120, Math.round((sp/al)*100));
  el.innerHTML = `
    <div class="srow">
      <div class="sbox"><div class="slbl">Runway</div>
        <div class="sval" style="cursor:pointer" onclick="editRunway()">$${STATE.budget.totalRunway.toLocaleString()}</div>
      </div>
      <div class="sbox"><div class="slbl">Allocated</div><div class="sval" style="color:${headroom<0?'var(--rd)':'var(--tb)'}">${totAlloc.toLocaleString()}</div></div>
      <div class="sbox"><div class="slbl">Headroom</div><div class="sval" style="color:${headroom<0?'var(--rd)':headroom<2000?'var(--am)':'var(--gn)'}">${headroom.toLocaleString()}</div></div>
      <div class="sbox"><div class="slbl">Spent</div><div class="sval">$${totSpent.toLocaleString()}</div></div>
    </div>
    <div style="background:var(--sf);border:1px solid var(--bd);padding:12px 14px;margin-bottom:18px">
      <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txd);margin-bottom:8px">Runway vs Allocation</div>
      <div class="pb"><div class="pf" style="width:${Math.min(100,(totAlloc/STATE.budget.totalRunway)*100)}%;background:${headroom<0?'var(--rd)':'var(--tl)'}"></div></div>
      <div style="font-size:10px;color:var(--txd);margin-top:8px">Segment plan: <span style="color:var(--tx)">$${segTot.toLocaleString()}</span> · Delta vs categories: <span style="color:${Math.abs(segTot-totAlloc)>1000?'var(--am)':'var(--gn)'}">${segTot>totAlloc?'+':''}${(segTot-totAlloc).toLocaleString()}</span></div>

      <div style="margin-bottom:14px">

      </div>`).join('')}`;

  return `You are the reasoning engine embedded in Ben Adams's Trip OS — his single source of truth for a 15-16 month SE Asia technical diving trip departing late May 2026.

You have full read access to all his current data. Reason carefully and directly across all domains. Ben is direct, dislikes hedged advice, wants action-first responses. Challenge his assumptions where warranted. Flag conflicts and risks explicitly.

${STATE.gear.map(g=>`• ${g.name} [${g.category}]${g.serial?` — ${g.serial}`:''}${g.dives?` — ${g.dives} dives`:''}${g.lastService?` — serviced ${g.lastService}`:''}${g.notes?` | ${g.notes}`:''}`).join('\n')}

${STATE.segments.map((seg,i)=>`${i+1}. ${seg.name} | ${seg.location} | ${seg.start}–${seg.end} | ${seg.days}d | $${(+seg.budgetUSD||0).toLocaleString()}${seg.notes?'\n   FLAGS: '+seg.notes:''}`).join('\n')}

=== BUDGET ===
Runway: $${STATE.budget.totalRunway.toLocaleString()} | Allocated: $${totAlloc.toLocaleString()} | Headroom: $${headroom.toLocaleString()}
Segment total: $${segTot.toLocaleString()} | Delta vs categories: ${segTot>totAlloc?'+':''}${(segTot-totAlloc).toLocaleString()}
${STATE.budget.categories.map(c=>`• ${c.name}: $${c.allocated.toLocaleString()} allocated / $${c.spent.toLocaleString()} spent`).join('\n')}

=== CERTIFICATIONS ===
${STATE.certs.map(c=>`• ${c.name} [${c.status}] ${c.agency||''}${c.date?` — ${c.date}`:''}${c.notes?` | ${c.notes}`:''}`).join('\n')}

=== HEALTH NOTES ===
${STATE.health.map(h=>`• ${h.date} [${h.category}] ${h.title}: ${h.notes}`).join('\n')||'None'}`;

      <div class="ptitle">Query History</div>
      <div style="background:var(--sf);border:1px solid var(--bd)">
        ${reasoningHistory.map((h,i) => `
          <div class="rhi" onclick="showHistoryItem(${i})">
            <div class="rhiq">${h.q.length>90?h.q.slice(0,90)+'…':h.q}</div>
            <div class="rhim">${h.time}</div>
          </div>`).join('')}
      </div>` : ''}`;
}

function addKeyPrompt(storageKey, label) {
  const val = prompt(`Paste your ${label}:`);
  if (val && val.startsWith('sk-')) {
    localStorage.setItem(storageKey, val.trim());
    toast('Key saved');
    renderReasoning();
  } else if (val) {
    alert('That doesn\'t look like a valid key. Keys start with sk-');
  }
}

function removeKey(storageKey) {
  localStorage.removeItem(storageKey);
  toast('Key removed');
  renderReasoning();
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mimeType });
      await transcribeAudio(blob, mimeType);
    };
    mediaRecorder.start();
    isRecording = true;
    const btn = document.getElementById('micBtn');
    if (btn) { btn.textContent = '⏹'; btn.classList.add('on'); }
    const dot = document.getElementById('rDot');
    const lbl = document.getElementById('rLabel');
    if (dot) dot.style.background = '#ff6060';
    if (lbl) lbl.textContent = '● Recording — tap ⏹ to stop';
  } catch(e) {
    alert('Microphone access denied. Please allow microphone access for this page in your browser settings.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  const btn = document.getElementById('micBtn');
  if (btn) { btn.textContent = '⏳'; btn.classList.remove('on'); btn.disabled = true; }
  const dot = document.getElementById('rDot');
  const lbl = document.getElementById('rLabel');
  if (dot) dot.style.background = 'var(--am)';
  if (lbl) lbl.textContent = 'Transcribing via Whisper...';
}

async function transcribeAudio(blob, mimeType) {
  const apiKey = localStorage.getItem('openai-whisper-key');
  if (!apiKey) { alert('No OpenAI key set.'); return; }
  try {
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const fd = new FormData();
    fd.append('file', new File([blob], `audio.${ext}`, { type: mimeType }));
    fd.append('model', 'whisper-1');
    fd.append('language', 'en');
    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}` },
      body: fd
    });
    const data = await res.json();
    if (data.text) {
      const input = document.getElementById('reasoningInput');
      if (input) input.value = (input.value ? input.value + ' ' : '') + data.text;
      toast('Transcribed ✓');
    } else {
      alert('Transcription failed. Check your OpenAI key.');
    }
  } catch(e) {
    alert('Whisper error: ' + e.message);
  }
  const btn = document.getElementById('micBtn');
  if (btn) { btn.textContent = '🎤'; btn.disabled = false; }
  const dot = document.getElementById('rDot');
  const lbl = document.getElementById('rLabel');
  if (dot) dot.style.background = '#9b77d4';
  if (lbl) lbl.textContent = 'Reasoning Engine';
}

async function submitReasoning() {
  const input = document.getElementById('reasoningInput');
  const q = input ? input.value.trim() : '';
  if (!q) return;
  const sendBtn = document.getElementById('sendBtn');
  const status = document.getElementById('rStatus');
  const output = document.getElementById('rOutput');
  if (sendBtn) sendBtn.disabled = true;
  if (status) { status.textContent = '● OPUS 4.7 REASONING...'; status.style.display = 'block'; }
  if (output) output.style.display = 'none';
  if (input) input.value = '';

  try {
    const res = await fetch('https://dive-trip-o-sproxy.vercel.app/api/claude', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-7',
        max_tokens: 1024,
        system: buildContext(),
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || JSON.stringify(data);
    if (output) { output.textContent = text; output.style.display = 'block'; }
    reasoningHistory.unshift({ q, a: text, time: new Date().toLocaleTimeString() });
    if (reasoningHistory.length > 10) reasoningHistory.pop();
  } catch(e) {
    if (output) { output.textContent = 'Error: ' + e.message; output.style.display = 'block'; }
  }
  if (status) status.style.display = 'none';
  if (sendBtn) sendBtn.disabled = false;
}

function showHistoryItem(i) {
  const h = reasoningHistory[i];
  if (!h) return;
  const input = document.getElementById('reasoningInput');
  const output = document.getElementById('rOutput');
  if (input) input.value = h.q;
  if (output) { output.textContent = h.a; output.style.display = 'block'; }
}

// ============================================================
// INIT
// ============================================================
renderDecisions();
</script>
</body>
</html>
